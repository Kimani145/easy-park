# ============================================================
# EasyPark — Production Nginx Reverse Proxy Configuration
# ============================================================
#
# DEPLOYMENT CONTEXT: Azure Web Apps (PaaS)
# TLS is terminated by Azure's upstream load balancer.
# This Nginx instance receives plain HTTP on port 80.
# Do NOT add ssl_certificate directives here — Azure owns
# the certificate. Adding them would cause startup failure
# on the Azure container.
#
# SRS REFERENCE:
#   Security Threat Matrix — API DoS Attacks (Medium):
#   "Nginx token-bucket rate limiting (10 req/min per Driver token)"
#
# RATE LIMITING KEY: $http_authorization (the raw Bearer token)
# Rationale: $binary_remote_addr (IP-based) would incorrectly
# bucket multiple drivers sharing NAT into a single limit.
# Token-based limiting enforces per-user rate control regardless
# of network topology.
# ============================================================

limit_req_zone $http_authorization zone=driver_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # --------------------------------------------------------
    # Documentation endpoints — no rate limiting
    # --------------------------------------------------------
    location /api/docs/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /api/redoc/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /api/schema/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # --------------------------------------------------------
    # Health check endpoint — no rate limiting, no auth.
    # Required by Azure Web Apps to determine instance health.
    # --------------------------------------------------------
    location /health/ {
        access_log off;
        proxy_pass       http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # --------------------------------------------------------
    # Auth endpoints — excluded from rate limiting.
    # Login and register must be reachable without a token.
    # Rate limiting by $http_authorization would block
    # unauthenticated login attempts before the token exists.
    # --------------------------------------------------------
    location /api/v1/auth/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --------------------------------------------------------
    # All other API endpoints — token-bucket rate limited.
    # burst=5: allows short bursts up to 5 requests without
    #   queuing. Handles legitimate rapid UI interactions.
    # nodelay: reject over-burst immediately (429) rather
    #   than queuing. Queuing wastes worker threads under DoS.
    # --------------------------------------------------------
    location /api/v1/ {
        limit_req zone=driver_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --------------------------------------------------------
    # Reject all other paths — no Django fallthrough.
    # --------------------------------------------------------
    location / {
        return 404;
    }
}
